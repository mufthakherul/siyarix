name: Downstream Compatibility

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/siyarix/**'
      - 'pyproject.toml'
      - 'data/**'
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-configs:
    name: Validate Existing Configurations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,all]"

      - name: Validate cyber_tools.json parses correctly
        run: |
          python -c "
          import json
          with open('data/cyber_tools.json') as f:
              data = json.load(f)
          print(f'cyber_tools.json: {len(data)} tools loaded successfully')

          required_fields = {'name', 'command', 'category', 'description'}
          for tool in data:
              missing = required_fields - set(tool.keys())
              if missing:
                  print(f'  WARNING: tool {tool.get(\"name\", \"unknown\")} missing fields: {missing}')

          categories = set(t.get('category', 'uncategorized') for t in data)
          print(f'Categories: {sorted(categories)}')
          print('Validation: PASSED')
          "

  validate-report-templates:
    name: Validate Report Templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,all]"

      - name: Check report module imports cleanly
        run: |
          python -c "
          from siyarix.report import ReportEngine
          print(f'ReportEngine imported: {ReportEngine}')
          print('Report module: PASSED')
          "

      - name: Validate SARIF output schema
        run: |
          python -c "
          import json, sys
          from siyarix.report.sarif import SarifRenderer
          print(f'SARIF Renderer available: {SarifRenderer}')
          print('SARIF schema check: PASSED')
          "

  validate-tool-schema:
    name: Validate Tool Schema Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,all]"

      - name: Import all major modules
        run: |
          python -c "
          import sys
          modules = [
              'siyarix.cli',
              'siyarix.execution_engine',
              'siyarix.provider_manager',
              'siyarix.nlp_engine',
              'siyarix.config',
              'siyarix.bootstrap',
              'siyarix.branding',
              'siyarix.onboarding',
              'siyarix.planner.router',
              'siyarix.planner.planner_integrated',
              'siyarix.memory.knowledge_graph',
              'siyarix.opsec.engine',
              'siyarix.audit.chain',
              'siyarix.output_engine',
          ]
          for mod_name in modules:
              try:
                  __import__(mod_name)
                  print(f'  OK: {mod_name}')
              except Exception as e:
                  print(f'  FAIL: {mod_name} — {e}')
                  sys.exit(1)
          print('All modules imported successfully: PASSED')
          "

  validate-backward-compat:
    name: Validate Backward Compatibility
    runs-on: ubuntu-latest
    needs: [validate-configs, validate-report-templates, validate-tool-schema]
    if: always()
    steps:
      - name: Post validation summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'SUMMARY'
          ## Downstream Compatibility

          Validates that existing data files, report templates, and module
          imports remain compatible with the current codebase.

          | Check | Status |
          |------|--------|
          | Configs | ${{ needs.validate-configs.result }} |
          | Report templates | ${{ needs.validate-report-templates.result }} |
          | Tool schema | ${{ needs.validate-tool-schema.result }} |
          SUMMARY

      - name: Create issue on failure
        if: contains(needs.*.result, 'failure') && github.event_name == 'schedule'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.issues.create({
              ...context.repo,
              title: '[Compat] Downstream compatibility check failed',
              body: 'One or more downstream compatibility checks failed on the latest main branch.\n\nDetails:\n- Configs: ${{ needs.validate-configs.result }}\n- Report templates: ${{ needs.validate-report-templates.result }}\n- Tool schema: ${{ needs.validate-tool-schema.result }}\n\n_Automated weekly check_',
              labels: ['bug', 'compatibility']
            })
