name: Generate Changelog

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update_changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --verbose --unreleased --strip header

      - name: Create changelog PR
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update changelog"
          title: "docs: update changelog"
          body: |
            Automated changelog update generated by [git-cliff](https://github.com/orhun/git-cliff).

            This PR is auto-generated and should be merged to keep the changelog current.
          branch: ci/changelog-update
          base: main
          labels: documentation
          delete-branch: true
