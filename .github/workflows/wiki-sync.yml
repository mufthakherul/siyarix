name: Sync Docs to Wiki

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: true

jobs:
  sync-wiki:
    name: Sync docs/ to GitHub Wiki
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'release' || !github.event.release.prerelease }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: repo

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ github.repository }}.wiki
          token: ${{ secrets.GITHUB_TOKEN }}
          path: wiki

      - name: Sync documentation files
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.venv' \
            repo/docs/ \
            wiki/

          cp repo/docs/index.md wiki/Home.md
          cp repo/docs/DOCS_MAP.md wiki/_Sidebar.md

      - name: Commit and push changes
        continue-on-error: true
        run: |
          cd wiki || exit 0
          if [ ! -d ".git" ]; then
            echo "::warning::Wiki not initialized"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          git add .
          git commit -m "docs: sync documentation changes from main repo

          Automated sync triggered by ${{ github.event_name }}
          Commit: ${{ github.sha }}" || true
          git push || echo "::warning::Failed to push to wiki. Ensure the Wiki is initialized in the GitHub UI and the token has push permissions."
