# Auto-label PRs based on changed file paths

src/siyarix/**/*.py:
  - core

src/siyarix/providers/**/*.py:
  - providers

src/siyarix/chat/**/*.py:
  - chat

src/siyarix/cli/**/*.py:
  - cli

src/siyarix/report/**/*.py:
  - reporting

src/siyarix/api/**/*.py:
  - api

tests/**/*.py:
  - testing

docs/**/*.md:
  - documentation

.github/**/*.yml:
  - ci/cd

Dockerfile:
  - docker

install.sh:
  - installer

install.ps1:
  - installer

pyproject.toml:
  - dependencies
