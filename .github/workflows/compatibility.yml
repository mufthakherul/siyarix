name: Future Compatibility

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions: read-all

jobs:
  future-python:
    name: Future Python Versions
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.14-dev"
          - "3.14-nightly"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          allow-prereleases: true
        continue-on-error: true

      - name: Install and Test
        run: |
          pip install -e .[dev] 2>/dev/null || true
          pip install pytest 2>/dev/null || true
          pytest tests/ -v --tb=short -x -m "not integration" --timeout=120 || true

  upstream-deps:
    name: Upstream Dependency Compatibility
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install with latest dependencies
        run: |
          pip install --upgrade pip
          pip install --upgrade --pre -e .[dev] 2>/dev/null || true
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short -x -m "not integration" --timeout=120 || true
