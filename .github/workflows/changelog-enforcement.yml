name: Changelog Enforcement

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enforce-changelog:
    name: Enforce Changelog Entry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check for CHANGELOG changes
        id: changed
        run: |
          git fetch origin ${{ github.base_ref }} --depth=50
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- CHANGELOG.md)
          if [ -n "$CHANGED" ]; then
            echo "changelog_changed=true" >> $GITHUB_OUTPUT
            echo "Changelog has been modified"
          else
            echo "changelog_changed=false" >> $GITHUB_OUTPUT
            echo "Changelog has NOT been modified"
          fi

      - name: Check for automatic-exempt labels
        id: exempt
        if: steps.changed.outputs.changelog_changed == 'false'
        run: |
          python -c "
          import os, json, subprocess

          # Get PR labels via gh
          result = subprocess.run(
              ['gh', 'pr', 'view', '${{ github.event.number }}',
               '--json', 'labels', '--jq', '.labels[].name'],
              capture_output=True, text=True, env={**os.environ, 'GH_TOKEN': os.environ.get('GITHUB_TOKEN', '')}
          )
          labels = [l.strip() for l in result.stdout.strip().split('\n') if l.strip()]

          exempt_labels = ['changelog-exempt', 'dependencies', 'bot', 'documentation', 'skip-changelog']
          is_exempt = any(l in exempt_labels for l in labels)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              if is_exempt:
                  out.write('is_exempt=true\n')
                  print('PR is exempt from changelog requirement')
              else:
                  out.write('is_exempt=false\n')
                  print('PR requires changelog entry')
          "

      - name: Check for skip-changelog in PR body
        if: steps.changed.outputs.changelog_changed == 'false' && steps.exempt.outputs.is_exempt != 'true'
        id: body_check
        run: |
          python -c "
          import os, json, subprocess

          result = subprocess.run(
              ['gh', 'pr', 'view', '${{ github.event.number }}',
               '--json', 'body', '--jq', '.body'],
              capture_output=True, text=True, env={**os.environ, 'GH_TOKEN': os.environ.get('GITHUB_TOKEN', '')}
          )
          body = result.stdout.strip()

          has_skip = '[skip-changelog]' in body or 'skip-changelog' in body

          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              if has_skip:
                  out.write('has_skip_tag=true\n')
              else:
                  out.write('has_skip_tag=false\n')
          "

      - name: Validate changelog entry format
        if: steps.changed.outputs.changelog_changed == 'true'
        run: |
          python -c "
          with open('CHANGELOG.md') as f:
              content = f.read()

          issues = []

          # Check for unreleased section
          if '## [unreleased]' not in content.lower() and '## [Unreleased]' not in content:
              issues.append('Missing ## [Unreleased] section')

          # Check recent entries have proper structure
          lines = content.split('\n')
          in_unreleased = False
          unreleased_entries = []
          for line in lines:
              stripped = line.strip()
              if stripped.startswith('## [') and 'unreleased' in stripped.lower():
                  in_unreleased = True
                  continue
              if in_unreleased:
                  if stripped.startswith('## ['):
                      break
                  if stripped.startswith('- ') or stripped.startswith('* '):
                      unreleased_entries.append(stripped)

          if not unreleased_entries:
              issues.append('No entries found under [Unreleased] section')

          if issues:
              for issue in issues:
                  print(f'  FAIL: {issue}')
              exit(1)
          else:
              print(f'Changelog format: PASSED ({len(unreleased_entries)} entries found)')
          "

      - name: Add failure comment on PR
        if: steps.changed.outputs.changelog_changed == 'false' && steps.exempt.outputs.is_exempt != 'true' && steps.body_check.outputs.has_skip_tag != 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const body = [
              '## Changelog Entry Required',
              '',
              'This PR targets **main** but does not include a changelog entry.',
              '',
              'Please add an entry under `## [Unreleased]` in `CHANGELOG.md` describing your change.',
              '',
              '**To skip this check**, add one of:',
              '- Label `skip-changelog` or `documentation` or `dependencies`',
              '- Include `[skip-changelog]` in the PR description',
              '',
              '> _This check only runs against the main branch._'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Changelog Entry Required')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body
              });
            }
            core.setFailed('Changelog entry required for PR targeting main');

      - name: Post summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'SUMMARY'
          ## Changelog Enforcement

          | Check | Status |
          |------|--------|
          | Changelog modified | ${{ steps.changed.outputs.changelog_changed }} |
          | Exempt | ${{ steps.exempt.outputs.is_exempt || 'N/A' }} |
          | Skip tag | ${{ steps.body_check.outputs.has_skip_tag || 'N/A' }} |
          SUMMARY
