name: Greetings
on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@3c71ce730280171fd1cfb57c00c774f8998586f7 # v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Welcome to **Siyarix**! Thank you for opening your first issue. 
            
            Our AI-native orchestration platform thrives on community input. A maintainer will review your issue shortly. In the meantime, please ensure you have provided as much context as possible (logs, reproduction steps, etc.) and check out our [Contributing Guidelines](CONTRIBUTING.md).
          pr-message: |
            🎉 Welcome and thank you for your first Pull Request to **Siyarix**!
            
            We are thrilled to have you contribute to the future of AI cybersecurity operations. Before we merge, please ensure that your PR passes all status checks and adheres to our [Code of Conduct](CODE_OF_CONDUCT.md). 
            
            A maintainer will review your code shortly!
