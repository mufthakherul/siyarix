name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version number (e.g., 1.0.0)
        required: true
        type: string
      publish_pypi:
        description: Publish to PyPI
        type: boolean
        default: true
      publish_apt:
        description: Build APT repository
        type: boolean
        default: true
      publish_docker:
        description: Build & push Docker image
        type: boolean
        default: true
      publish_winget:
        description: Submit to winget
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write
  attestations: write

env:
  PKG_VERSION: ${{ github.event.inputs.version }}
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  validate-tag:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      semver: ${{ steps.semver.outputs.semver }}
      prerelease: ${{ steps.semver.outputs.prerelease }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Strip leading v
        id: version
        run: |
          VER="${{ env.PKG_VERSION }}"
          VER="${VER#v}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Validate semver
        id: semver
        run: |
          VER="${{ steps.version.outputs.version }}"
          if [[ ! "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Invalid semver: $VER"
            exit 1
          fi
          echo "semver=${VER}" >> "$GITHUB_OUTPUT"
          PRERELEASE="false"
          if [[ "$VER" =~ alpha|beta|rc ]]; then
            PRERELEASE="true"
          fi
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          curl -fsSL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-2.13.1-x86_64-unknown-linux-gnu.tar.gz -o /tmp/git-cliff.tar.gz
          tar xzf /tmp/git-cliff.tar.gz -C /usr/local/bin

      - name: Generate Changelog
        run: |
          git-cliff --config cliff.toml --tag v${{ needs.validate-tag.outputs.semver }} -o CHANGELOG.md

      - name: Commit Changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): update changelog for v${{ needs.validate-tag.outputs.semver }}" || true
          git push origin HEAD || true

  build-python:
    name: Build Python Packages
    runs-on: ubuntu-latest
    needs: validate-tag
    outputs:
      wheel: ${{ steps.wheel-name.outputs.wheel }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Build sdist & wheel
        run: |
          uv pip install --system build twine check-wheel-contents
          python -m build
          check-wheel-contents dist/ --ignore W002
          twine check dist/*

      - name: Get wheel name
        id: wheel-name
        run: |
          WHL=$(ls dist/*.whl | head -1)
          echo "wheel=$(basename ${WHL})" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-python
          path: dist/
          retention-days: 30

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [validate-tag, build-python, test-python-package]
    if: ${{ github.event.inputs.publish_pypi != 'false' }}
    environment:
      name: pypi
      url: https://pypi.org/project/siyarix/
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist-python
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [validate-tag, build-python]
    if: ${{ github.event.inputs.publish_pypi == 'true' }}
    environment:
      name: testpypi
      url: https://test.pypi.org/project/siyarix/
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist-python
          path: dist/

      - name: Publish to TestPyPI
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  test-python-package:
    name: Test Python Package
    runs-on: ubuntu-latest
    needs: [validate-tag, build-python]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist-python
          path: dist/

      - name: Install from wheel & test
        run: |
          uv pip install --system dist/*.whl
          uv pip install --system pytest pytest-asyncio pytest-cov
          siyarix --version
          python -c "import siyarix; print('Package OK:', siyarix.__version__)"
          python -m pytest --pyargs siyarix -v --tb=short -x -m "not integration" --timeout=60 || true


  build-deb:
    name: Build DEB Package
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install deb build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev fakeroot

      - name: Build .deb and APT repo
        run: |
          bash packages/deb/build-deb.sh "${{ needs.validate-tag.outputs.version }}"
          bash packages/deb/build-apt-repo.sh "${{ needs.validate-tag.outputs.version }}"

      - name: Upload .deb
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-deb
          path: |
            *.deb
            packages/deb/apt-repo/
          retention-days: 30

  publish-apt:
    name: Deploy APT Repository
    runs-on: ubuntu-latest
    needs: [validate-tag, build-deb]
    if: ${{ github.event.inputs.publish_apt != 'false' }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist-deb
          path: apt-repo

      - name: Normalize APT artifact path
        run: |
          mkdir -p apt-site
          if [ -d apt-repo/packages/deb/apt-repo ]; then
            cp -R apt-repo/packages/deb/apt-repo/. apt-site/
          elif [ -d apt-repo/apt-repo ]; then
            cp -R apt-repo/apt-repo/. apt-site/
          else
            cp -R apt-repo/. apt-site/
          fi

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apt-site
          destination_dir: apt
          keep_files: true

  build-installers:
    name: Package Installers & Manifests
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Collect installer assets
        run: |
          mkdir -p dist-installers
          cp install.sh dist-installers/
          cp install-termux.sh dist-installers/
          cp install.ps1 dist-installers/siyarix-install.ps1
          cp packages/homebrew/siyarix.rb dist-installers/ 2>/dev/null || true
          cp packages/chocolatey/tools/chocolateyinstall.ps1 dist-installers/
          cp packages/winget/Mufthakherul.Siyarix.yaml dist-installers/
          cp packages/winget/Mufthakherul.Siyarix.installer.yaml dist-installers/
          cp packages/winget/Mufthakherul.Siyarix.locale.en-US.yaml dist-installers/

      - name: Upload installer assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-installers
          path: dist-installers/
          retention-days: 30

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: validate-tag
    if: ${{ github.event.inputs.publish_docker != 'false' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=v${{ needs.validate-tag.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.validate-tag.outputs.version }}
            type=semver,pattern={{major}},value=v${{ needs.validate-tag.outputs.version }}
            type=raw,value=latest

      - name: Build and push (multi-platform)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  submit-winget:
    name: Submit to Winget
    runs-on: ubuntu-latest
    needs: [validate-tag, create-github-release]
    if: ${{ github.event.inputs.publish_winget != 'false' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Submit winget PR
        uses: vedantmgoyal2009/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        with:
          identifier: Mufthakherul.Siyarix
          version: ${{ needs.validate-tag.outputs.version }}
          installers-regex: 'siyarix-install\.ps1'
          token: ${{ secrets.GITHUB_TOKEN }}

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-tag, build-python, build-deb, build-installers, build-docker]
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/

      - name: Generate release notes
        id: release-notes
        run: |
          echo "## What's Changed" > release_notes.md
          git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD >> release_notes.md || true

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: v${{ needs.validate-tag.outputs.version }}
          name: Release v${{ needs.validate-tag.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ needs.validate-tag.outputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/dist-python/*.whl
            artifacts/dist-python/*.tar.gz
            artifacts/dist-deb/*.deb
            artifacts/dist-installers/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-attestations:
    name: Generate Attestations
    runs-on: ubuntu-latest
    needs: [create-github-release, build-python]
    if: ${{ needs.build-python.result == 'success' }}
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist-python
          path: dist/

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-path: 'dist/*'

  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [validate-tag, create-github-release, publish-pypi, publish-apt, submit-winget, generate-attestations]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Release v${{ needs.validate-tag.outputs.version }} Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PyPI (siyarix) | ${{ needs.publish-pypi.result }} |" >> $GITHUB_STEP_SUMMARY

          echo "| APT (deb) | ${{ needs.publish-apt.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Winget | ${{ needs.submit-winget.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker (ghcr.io) | ${{ needs.build-docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ${{ needs.create-github-release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Attestations | ${{ needs.generate-attestations.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install Commands" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '| Method | Command |' >> $GITHUB_STEP_SUMMARY
          echo '|--------|---------|' >> $GITHUB_STEP_SUMMARY
          echo '| pip | `pip install siyarix` |' >> $GITHUB_STEP_SUMMARY
          echo '| pipx | `pipx install siyarix` |' >> $GITHUB_STEP_SUMMARY
          echo '| uv | `uv tool install siyarix` |' >> $GITHUB_STEP_SUMMARY

          echo '| APT (Kali/Debian/Ubuntu) | `sudo apt install siyarix` |' >> $GITHUB_STEP_SUMMARY
          echo '| Homebrew (macOS) | `brew install siyarix` |' >> $GITHUB_STEP_SUMMARY
          echo '| Docker | `docker run ghcr.io/mufthakherul/siyarix:latest` |' >> $GITHUB_STEP_SUMMARY
          echo '| Windows (winget) | `winget install Mufthakherul.Siyarix` |' >> $GITHUB_STEP_SUMMARY
          echo '| Windows (choco) | `choco install siyarix` |' >> $GITHUB_STEP_SUMMARY
          echo '| Universal (curl) | `curl -fsSL https://siyarix.github.io/install.sh | bash` |' >> $GITHUB_STEP_SUMMARY
          echo '| Universal (pwsh) | `irm https://siyarix.github.io/install.ps1 | iex` |' >> $GITHUB_STEP_SUMMARY
