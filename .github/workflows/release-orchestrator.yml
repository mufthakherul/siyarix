name: Release Orchestrator

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version number (e.g., 1.0.1 or v1.0.1)
        required: true
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: release-orchestrator-${{ github.event.release.tag_name || github.ref_name || github.event.inputs.version }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Tag/Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      branch: ${{ steps.resolve.outputs.branch }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Resolve version and target branch
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
            BRANCH="${{ github.event.repository.default_branch }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            BRANCH="${{ github.event.release.target_commitish || github.event.repository.default_branch }}"
          else
            TAG="${{ github.ref_name }}"
            BRANCH="${{ github.event.repository.default_branch }}"
          fi
          VER="${TAG#v}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VER}" >> "$GITHUB_OUTPUT"

      - name: Validate semver format
        run: |
          VER="${{ steps.resolve.outputs.version }}"
          if [[ ! "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Invalid semantic version: $VER"
            exit 1
          fi
          echo "Valid semver: $VER"

      - name: Check tag does not already exist
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists. Choose a new version."
            exit 1
          fi
          echo "Tag ${TAG} is available."

  sync-versions:
    name: Sync Version Files
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      branch: ${{ steps.push.outputs.branch || needs.validate.outputs.branch }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.validate.outputs.branch }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Synchronize all versioned files
        run: |
          python - <<'PY'
          import json, re, hashlib
          from pathlib import Path

          version = "${{ needs.validate.outputs.version }}"
          tag = f"v{version}"

          transforms = {
              "pyproject.toml": lambda t: re.sub(
                  r'(?m)^version = "[^"]+"$', f'version = "{version}"', t, count=1
              ),
              "src/siyarix/__init__.py": lambda t: re.sub(
                  r'(?m)^__version__ = "[^"]+"$',
                  f'__version__ = "{version}"',
                  t,
                  count=1,
              ),
              "installer/install.ps1": lambda t: re.sub(
                  r'(?m)^\$__script_version = "[^"]+"$',
                  f'$__script_version = "{version}"',
                  t,
                  count=1,
              ),
              "installer/install.sh": lambda t: re.sub(
                  r'(?m)^SIYARIX_VERSION="\$\{SIYARIX_VERSION:-[^"]+\}"$',
                  'SIYARIX_VERSION="${SIYARIX_VERSION:-' + version + '}"',
                  t,
                  count=1,
              ),
              "installer/install-termux.sh": lambda t: re.sub(
                  r'(?m)^SIYARIX_VERSION="\$\{SIYARIX_VERSION:-[^"]+\}"$',
                  'SIYARIX_VERSION="${SIYARIX_VERSION:-' + version + '}"',
                  t,
                  count=1,
              ),
              "packages/harmonyos/module.json5": lambda t: re.sub(
                  r'"name":\s*"[^"]+"',
                  f'"name": "{version}"',
                  t,
                  count=1,
              ),
              "packages/chocolatey/siyarix.nuspec": lambda t: re.sub(
                  r'<version>[^<]+</version>',
                  f'<version>{version}</version>',
                  t,
                  count=1,
              ),
              "packages/chocolatey/tools/chocolateyinstall.ps1": lambda t: re.sub(
                  r"(?m)^\$version = '[^']+'$",
                  f"$version = '{version}'",
                  re.sub(
                      r"(?m)^\$url = 'https://github.com/mufthakherul/siyarix/archive/refs/tags/v[^']+\.tar\.gz'$",
                      f"$url = 'https://github.com/mufthakherul/siyarix/archive/refs/tags/{tag}.tar.gz'",
                      t,
                      count=1,
                  ),
                  count=1,
              ),
              "README.md": lambda t: re.sub(
                  r'https://img\.shields\.io/badge/Release-v[0-9A-Za-z\.-]+-blue\?style=flat-square&logo=github',
                  f'https://img.shields.io/badge/Release-v{version}-blue?style=flat-square&logo=github',
                  t,
                  count=1,
              ),
          }

          for path_str, fn in transforms.items():
              p = Path(path_str)
              text = p.read_text(encoding="utf-8")
              p.write_text(fn(text), encoding="utf-8")

          # Calculate SHA-256 hash of updated install.ps1 for WinGet
          install_ps1 = Path("installer/install.ps1")
          install_sha = hashlib.sha256(install_ps1.read_bytes()).hexdigest()

          for wf in [
              "packages/winget/Mufthakherul.Siyarix.yaml",
              "packages/winget/Mufthakherul.Siyarix.installer.yaml",
              "packages/winget/Mufthakherul.Siyarix.locale.en-US.yaml",
          ]:
              p = Path(wf)
              manifest = json.loads(p.read_text(encoding="utf-8"))
              manifest["PackageVersion"] = version
              for installer in manifest.get("Installers", []):
                  url = installer.get("InstallerUrl")
                  if isinstance(url, str):
                      installer["InstallerUrl"] = re.sub(
                          r"/download/v[^/]+/", f"/download/{tag}/", url
                      )
                  if "InstallerSha256" in installer:
                      installer["InstallerSha256"] = install_sha
              if "InstallerUrl" in manifest:
                  manifest["InstallerUrl"] = re.sub(
                      r"/download/v[^/]+/", f"/download/{tag}/", manifest["InstallerUrl"]
                  )
              if "ReleaseNotesUrl" in manifest:
                  manifest["ReleaseNotesUrl"] = re.sub(
                      r"/tag/v[^/]+$", f"/tag/{tag}", manifest["ReleaseNotesUrl"]
                  )
              p.write_text(json.dumps(manifest, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY

      - name: Commit synced versions
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No version updates needed."
            exit 0
          fi
          git add pyproject.toml src/siyarix/__init__.py installer/install.ps1 installer/install.sh \
            installer/install-termux.sh \
            packages/harmonyos/module.json5 \
            packages/chocolatey/siyarix.nuspec \
            packages/chocolatey/tools/chocolateyinstall.ps1 \
            packages/winget/Mufthakherul.Siyarix.yaml \
            packages/winget/Mufthakherul.Siyarix.installer.yaml \
            packages/winget/Mufthakherul.Siyarix.locale.en-US.yaml README.md
          git commit -m "chore: sync all version references to ${{ needs.validate.outputs.version }}"
          git push origin "HEAD:${{ needs.validate.outputs.branch }}"
          echo "branch=${{ needs.validate.outputs.branch }}" >> "$GITHUB_OUTPUT"

  run-release-workflow:
    name: Dispatch Release Workflow
    runs-on: ubuntu-latest
    needs: [validate, sync-versions]
    steps:
      - name: Trigger release.yml
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "release.yml",
              ref: "${{ needs.sync-versions.outputs.branch || needs.validate.outputs.branch }}",
              inputs: {
                version: "${{ needs.validate.outputs.version }}",
                publish_pypi: "true",
                publish_apt: "true",
                publish_docker: "true",
                publish_winget: "true"
              }
            });
