name: Maintenance

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM
    - cron: '0 0 1 * *'  # Monthly on the 1st
  workflow_dispatch:
    inputs:
      task:
        description: 'Maintenance task to run'
        required: true
        type: choice
        options:
          - all
          - update-deps
          - cleanup
          - audit

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  weekly-update:
    name: Weekly Dependency Update
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for updates
        run: |
          python -m pip install --upgrade pip
          pip list --outdated --format=columns || true

      - name: Create issue for outdated deps
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'dependencies',
              state: 'open'
            });

            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '📦 Weekly: Dependency Updates Available',
                body: `## Dependencies Update Check\n\nChecked on: ${new Date().toISOString().split('T')[0]}\n\nPlease review and update dependencies when possible.\n\n*Automated weekly check*`,
                labels: ['dependencies', 'enhancement']
              });
            }

  monthly-audit:
    name: Monthly Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Run full test suite
        run: |
          pytest -v --tb=short -x || true

      - name: Generate audit report
        uses: actions/github-script@v7
        with:
          script: |
            console.log('## Monthly Audit Report');
            console.log('Date:', new Date().toISOString().split('T')[0]);
            console.log('Status: Completed');
            console.log('');
            console.log('### Next Steps');
            console.log('- Review test results');
            console.log('- Update outdated dependencies');
            console.log('- Check for security advisories');

  cleanup:
    name: Repository Cleanup
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.task == 'all' || github.event.inputs.task == 'cleanup')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean up old branches
        uses: actions/github-script@v7
        with:
          script: |
            const { data: branches } = await github.rest.repos.listBranches({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            // Get merged PRs
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              per_page: 100
            });

            const mergedBranches = prs
              .filter(pr => pr.merged_at)
              .map(pr => pr.head.ref);

            console.log('Merged branches to consider deleting:', mergedBranches.length);

      - name: Clean up old Artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const { data: artifacts } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            // Delete old artifacts (older than 30 days)
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

            for (const artifact of artifacts.data) {
              const created = new Date(artifact.created_at);
              if (created < thirtyDaysAgo) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
                console.log(`Deleted artifact: ${artifact.name}`);
              }
            }

      - name: Clean up old Runs
        uses: actions/github-script@v7
        with:
          script: |
            // Get workflow runs
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
              status: 'completed'
            });

            // Keep last 50 runs
            console.log(`Total runs: ${runs.data.workflow_runs.length}`);

  audit:
    name: Full Repository Audit
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.task == 'all' || github.event.inputs.task == 'audit')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate audit report
        run: |
          echo "# Repository Audit Report" > audit.md
          echo "Date: $(date)" >> audit.md
          echo "" >> audit.md

          # Branch stats
          echo "## Branches" >> audit.md
          git branch -a | wc -l | xargs echo "- Total:" >> audit.md
          echo "" >> audit.md

          # Commit stats
          echo "## Commits" >> audit.md
          git rev-list --count HEAD | xargs echo "- Total:" >> audit.md
          git rev-list --count --since="2024-01-01" HEAD | xargs echo "- 2024 onward:" >> audit.md
          echo "" >> audit.md

          # Contributor stats
          echo "## Contributors" >> audit.md
          git shortlog -sn | head -10 >> audit.md
          echo "" >> audit.md

          # File stats
          echo "## Files" >> audit.md
          find . -type f -name "*.py" | wc -l | xargs echo "- Python files:" >> audit.md
          find . -type f -name "*.md" | wc -l | xargs echo "- Markdown files:" >> audit.md
          echo "" >> audit.md

          cat audit.md

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit.md

  summary:
    name: Summary Report
    runs-on: ubuntu-latest
    needs: [weekly-update, monthly-audit]
    if: always() && github.event_name == 'schedule'
    steps:
      - name: Generate summary
        run: |
          echo "## Maintenance Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Task | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Weekly Dependency Update | ${{ needs.weekly-update.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Monthly Audit | ${{ needs.monthly-audit.result }} |" >> $GITHUB_STEP_SUMMARY
