# Auto-label PRs based on changed file paths

core:
  - changed-files:
      - any-glob-to-any-file: ['src/siyarix/**/*.py']

providers:
  - changed-files:
      - any-glob-to-any-file: ['src/siyarix/providers/**/*.py']

chat:
  - changed-files:
      - any-glob-to-any-file: ['src/siyarix/chat/**/*.py']

cli:
  - changed-files:
      - any-glob-to-any-file: ['src/siyarix/cli/**/*.py']

reporting:
  - changed-files:
      - any-glob-to-any-file: ['src/siyarix/report/**/*.py']

api:
  - changed-files:
      - any-glob-to-any-file: ['src/siyarix/api/**/*.py']

testing:
  - changed-files:
      - any-glob-to-any-file: ['tests/**/*.py']

documentation:
  - changed-files:
      - any-glob-to-any-file: ['docs/**/*.md']

ci/cd:
  - changed-files:
      - any-glob-to-any-file: ['.github/**/*.yml']

docker:
  - changed-files:
      - any-glob-to-any-file: ['Dockerfile']

installer:
  - changed-files:
      - any-glob-to-any-file:
          - 'installer/install.sh'
          - 'installer/install.ps1'
          - 'installer/install-termux.sh'

dependencies:
  - changed-files:
      - any-glob-to-any-file: ['pyproject.toml']
