[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
markers =
    slow: marks tests as slow (e.g., integration tests, network-dependent)
    bootstrap: marks bootstrap/initialization tests
    cvss: marks CVSS scoring tests
    report: marks report engine tests
    stealth: marks stealth/evasion tests
    terminal: marks terminal/UI-related tests
    tool_installer: marks tool installer tests
    benchmark: marks performance benchmark tests
    e2e: marks end-to-end integration tests
    security: marks security-focused tests
    parser: marks parser-specific tests
    chat: marks chat/repl tests
    health: marks health check tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
