[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    network: marks tests that require network access
    parser: marks parser-specific tests
    agent: marks agent-specific tests
    xi: marks XI module tests
    exploitation: marks exploitation chain tests
    anomaly: marks ML anomaly detection tests
    deception: marks deception/honeypot tests
    threat_intel: marks threat intelligence tests
    distributed: marks distributed task tests
    stealth: marks stealth/evasion tests
    canary: marks canary token tests
    dashboard: marks dashboard tests
    security: marks security/hardening tests
    compliance: marks compliance framework tests
    adversarial: marks adversarial risk detection tests
    cloud: marks cloud security scanner tests
    bootstrap: marks bootstrap/initialization tests
    cvss: marks CVSS scoring tests
    report: marks report engine tests
    playbook: marks playbook engine tests
    terminal: marks terminal detection tests
    tool_installer: marks tool installer tests
    ensemble: marks multi-model ensemble tests
    opentelemetry: marks OpenTelemetry instrumentation tests
    workflow: marks workflow runtime tests
    siem: marks SIEM telemetry tests
    integration: marks integration-level tests
    e2e: marks end-to-end tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
