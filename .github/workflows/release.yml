name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.1.3)'
        required: true
        type: string
      publish_pypi:
        description: 'Publish to PyPI'
        type: boolean
        default: true
      publish_npm:
        description: 'Publish to npm'
        type: boolean
        default: true
      publish_apt:
        description: 'Build APT repository'
        type: boolean
        default: true
      publish_docker:
        description: 'Build & push Docker image'
        type: boolean
        default: true
      publish_winget:
        description: 'Submit to winget'
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write

env:
  PKG_VERSION: ${{ github.event.inputs.version }}
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  validate-tag:
    name: Validate Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      semver: ${{ steps.semver.outputs.semver }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VER="${{ env.PKG_VERSION }}"
          VER="${VER#v}"
          echo "version=${VER}" >> $GITHUB_OUTPUT

      - name: Validate semver
        id: semver
        run: |
          VER="${{ steps.version.outputs.version }}"
          if [[ ! "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Invalid semver: $VER"
            exit 1
          fi
          echo "semver=${VER}" >> $GITHUB_OUTPUT

  # ==============================
  # PYTHON PACKAGE (PyPI)
  # ==============================
  build-python:
    name: Build Python Packages
    runs-on: ubuntu-latest
    needs: validate-tag
    outputs:
      wheel: ${{ steps.wheel-name.outputs.wheel }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          pip install --upgrade pip build twine check-wheel-contents

      - name: Build sdist & wheel
        run: python -m build

      - name: Check wheel
        run: check-wheel-contents dist/

      - name: Twine check
        run: twine check dist/*

      - name: Get wheel name
        id: wheel-name
        run: |
          WHL=$(ls dist/*.whl | head -1)
          echo "wheel=$(basename ${WHL})" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-python
          path: dist/
          retention-days: 30

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [validate-tag, build-python, test-python-package]
    if: ${{ github.event.inputs.publish_pypi != 'false' }}
    environment:
      name: pypi
      url: https://pypi.org/project/siyarix/
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-python
          path: dist/

      - name: Skip when PyPI token is unavailable
        if: env.PYPI_API_TOKEN == ''
        run: echo "::warning::PYPI_API_TOKEN is not configured; skipping publish."

      - name: Publish to PyPI
        if: env.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ env.PYPI_API_TOKEN }}
          skip-existing: true

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [validate-tag, build-python]
    if: ${{ github.event.inputs.publish_pypi == 'true' }}
    environment:
      name: testpypi
      url: https://test.pypi.org/project/siyarix/
    env:
      TEST_PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-python
          path: dist/

      - name: Skip when TestPyPI token is unavailable
        if: env.TEST_PYPI_API_TOKEN == ''
        run: echo "::warning::TEST_PYPI_API_TOKEN is not configured; skipping publish."

      - name: Publish to TestPyPI
        if: env.TEST_PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ env.TEST_PYPI_API_TOKEN }}
          skip-existing: true

  test-python-package:
    name: Test Python Package
    runs-on: ubuntu-latest
    needs: [validate-tag, build-python]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          name: dist-python
          path: dist/

      - name: Install from wheel
        run: |
          pip install dist/*.whl
          pip install pytest pytest-asyncio pytest-cov

      - name: Verify import
        run: |
          siyarix --version
          python -c "import siyarix; print('Package OK:', siyarix.__version__)"

      - name: Run tests from installed package
        run: |
          python -m pytest --pyargs siyarix -v --tb=short -x -m "not integration" --timeout=60 || true

  # ==============================
  # NPM PACKAGE
  # ==============================
  build-npm:
    name: Build NPM Package
    runs-on: ubuntu-latest
    needs: validate-tag
    defaults:
      run:
        working-directory: packages/npm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Update version
        run: |
          VER="${{ needs.validate-tag.outputs.version }}"
          node -e "const p=require('./package.json'); p.version='${VER}'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Lint & check
        run: |
          for file in bin/siyarix.js bin/siyarix-install.js lib/installer.js; do
            if [[ -f "$file" ]]; then
              node --check "$file"
            else
              echo "::warning::Skipping missing file: $file"
            fi
          done
          npm pack --dry-run

      - name: Pack
        run: npm pack

      - name: Upload npm package
        uses: actions/upload-artifact@v7
        with:
          name: dist-npm
          path: packages/npm/*.tgz
          retention-days: 30

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [validate-tag, build-npm]
    if: ${{ github.event.inputs.publish_npm != 'false' }}
    defaults:
      run:
        working-directory: packages/npm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Update version
        run: |
          VER="${{ needs.validate-tag.outputs.version }}"
          node -e "const p=require('./package.json'); p.version='${VER}'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Check existing npm version
        id: npm-version
        run: |
          VER="${{ needs.validate-tag.outputs.version }}"
          if npm view "@mufthakherul/siyarix@${VER}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version ${VER} already exists on npm. Skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: env.NODE_AUTH_TOKEN != '' && steps.npm-version.outputs.exists != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip when npm token is unavailable
        if: env.NODE_AUTH_TOKEN == ''
        run: echo "::warning::NPM_TOKEN is not configured; skipping publish."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ==============================
  # DEB / APT PACKAGE
  # ==============================
  build-deb:
    name: Build DEB Package
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deb build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev fakeroot

      - name: Build .deb
        run: |
          bash packages/deb/build-deb.sh "${{ needs.validate-tag.outputs.version }}"

      - name: Build APT repository
        run: |
          bash packages/deb/build-apt-repo.sh "${{ needs.validate-tag.outputs.version }}"

      - name: Upload .deb
        uses: actions/upload-artifact@v7
        with:
          name: dist-deb
          path: |
            *.deb
            packages/deb/apt-repo/
          retention-days: 30

  publish-apt:
    name: Deploy APT Repository
    runs-on: ubuntu-latest
    needs: [validate-tag, build-deb]
    if: ${{ github.event.inputs.publish_apt != 'false' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-deb
          path: apt-repo

      - name: Normalize APT artifact path
        run: |
          mkdir -p apt-site
          if [ -d apt-repo/packages/deb/apt-repo ]; then
            cp -R apt-repo/packages/deb/apt-repo/. apt-site/
          elif [ -d apt-repo/apt-repo ]; then
            cp -R apt-repo/apt-repo/. apt-site/
          else
            cp -R apt-repo/. apt-site/
          fi

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apt-site
          destination_dir: apt
          keep_files: true

  build-installers:
    name: Package Installers & Manifests
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@v4

      - name: Collect installer assets
        run: |
          mkdir -p dist-installers
          cp install.sh dist-installers/
          cp install.ps1 dist-installers/siyarix-install.ps1
          cp packages/harmonyos/install-harmonyos.sh dist-installers/
          cp packages/homebrew/siyarix.rb dist-installers/
          cp packages/chocolatey/tools/chocolateyinstall.ps1 dist-installers/
          cp packages/winget/Mufthakherul.Siyarix.yaml dist-installers/
          cp packages/winget/Mufthakherul.Siyarix.installer.yaml dist-installers/
          cp packages/winget/Mufthakherul.Siyarix.locale.en-US.yaml dist-installers/

      - name: Upload installer assets
        uses: actions/upload-artifact@v7
        with:
          name: dist-installers
          path: dist-installers/
          retention-days: 30

  # ==============================
  # DOCKER IMAGE
  # ==============================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: validate-tag
    if: ${{ github.event.inputs.publish_docker != 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.validate-tag.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==============================
  # WINGET SUBMISSION (auto-PR)
  # ==============================
  submit-winget:
    name: Submit to Winget
    runs-on: ubuntu-latest
    needs: [validate-tag, create-github-release]
    if: ${{ github.event.inputs.publish_winget != 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Submit winget PR
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: Mufthakherul.Siyarix
          version: ${{ needs.validate-tag.outputs.version }}
          installers-regex: 'siyarix-install\.ps1'
          token: ${{ secrets.GITHUB_TOKEN }}

  # ==============================
  # GITHUB RELEASE
  # ==============================
  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-tag, build-python, build-npm, build-deb, build-installers, build-docker]
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate release notes
        id: release-notes
        run: |
          echo "## What's Changed" > release_notes.md
          git log --pretty=format:"- %s (%h)" ${{ needs.validate-tag.outputs.semver }}^..HEAD >> release_notes.md || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-tag.outputs.version }}
          name: Release v${{ needs.validate-tag.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(needs.validate-tag.outputs.version, 'alpha') || contains(needs.validate-tag.outputs.version, 'beta') || contains(needs.validate-tag.outputs.version, 'rc') }}
          generate_release_notes: true
          files: |
            artifacts/dist-python/*.whl
            artifacts/dist-python/*.tar.gz
            artifacts/dist-npm/*.tgz
            artifacts/dist-deb/*.deb
            artifacts/dist-installers/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==============================
  # SUMMARY
  # ==============================
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [validate-tag, create-github-release, publish-pypi, publish-npm, publish-apt, submit-winget]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Release v${{ needs.validate-tag.outputs.version }} Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PyPI (siyarix) | ${{ needs.publish-pypi.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm (@mufthakherul/siyarix) | ${{ needs.publish-npm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| APT (deb) | ${{ needs.publish-apt.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Winget | ${{ needs.submit-winget.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker (ghcr.io) | ${{ needs.build-docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ${{ needs.create-github-release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install Commands" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '| Method | Command |' >> $GITHUB_STEP_SUMMARY
          echo '|--------|---------|' >> $GITHUB_STEP_SUMMARY
          echo '| pip | `pip install siyarix` |' >> $GITHUB_STEP_SUMMARY
          echo '| pipx | `pipx install siyarix` |' >> $GITHUB_STEP_SUMMARY
          echo '| uv | `uv tool install siyarix` |' >> $GITHUB_STEP_SUMMARY
          echo '| npm | `npm install -g @mufthakherul/siyarix` |' >> $GITHUB_STEP_SUMMARY
          echo '| APT (Kali/Debian/Ubuntu) | `sudo apt install siyarix` |' >> $GITHUB_STEP_SUMMARY
          echo '| Homebrew (macOS) | `brew install siyarix` |' >> $GITHUB_STEP_SUMMARY
          echo '| Docker | `docker run ghcr.io/mufthakherul/siyarix:latest` |' >> $GITHUB_STEP_SUMMARY
          echo '| Windows (winget) | `winget install Mufthakherul.Siyarix` |' >> $GITHUB_STEP_SUMMARY
          echo '| Windows (choco) | `choco install siyarix` |' >> $GITHUB_STEP_SUMMARY
          echo '| Universal (curl) | `curl -fsSL https://siyarix.dev/install.sh | bash` |' >> $GITHUB_STEP_SUMMARY
          echo '| Universal (pwsh) | `irm https://siyarix.dev/install.ps1 | iex` |' >> $GITHUB_STEP_SUMMARY
