name: Dependency Updates Automation

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  pip-compile:
    name: pip-compile lock refresh
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Refresh lock files
        run: |
          uv lock --upgrade 2>/dev/null || echo "uv lock not available, skipping"

      - name: Create PR for lock updates
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "build: update dependency lock files"
          title: "build: update dependency lock files"
          body: |
            Automated refresh of dependency lock files.

            If all checks pass, this PR will be auto-merged.
          branch: ci/dependency-lock-update
          base: main
          labels: dependencies
          delete-branch: true

  report-outdated:
    name: Report Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: List outdated packages
        run: |
          pip install -e .
          echo "## Outdated Dependencies" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          pip list --outdated --format=columns >> $GITHUB_STEP_SUMMARY || echo "No outdated packages found."
