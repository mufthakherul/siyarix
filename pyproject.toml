[project]
name = "nexsec"
version = "0.4.0"
description = "NexSec by NexSec — A security agent with autonomous execution engine, dynamic planning, and intelligent tool orchestration"
description-content-type = "text/markdown"
readme = "README.md"
authors = [ { name = "MD MUFTHAKHERUL ISLAM MIRAZ", email = "130831166+mufthakherul@users.noreply.github.com" } ]
requires-python = ">=3.11"
urls = { "Homepage" = "https://github.com/mufthakherul/nexsec", "Repository" = "https://github.com/mufthakherul/nexsec.git" }
license = { text = "MIT" }
keywords = ["cybersecurity", "agent", "nmap", "scanner", "autonomous", "integrated", "security"]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Topic :: Security",
  "Typing :: Typed",
]
dependencies = [
  "typer>=0.12",
  "rich>=13",
  "websockets>=12",
  "httpx>=0.27",
  "pydantic>=2.5",
  "aiofiles>=23.0",
  "keyring>=25.0",
  "cryptography>=42.0",
  "tenacity>=8.2.0",
  "psutil>=5.9.0",
]

[project.optional-dependencies]
autonomous = [
  "openai>=2.31.0",
]
fast = [
  "maturin>=1.7",
]
all = [
  "openai>=2.31.0",
  "pyyaml>=6.0",
  "maturin>=1.7",
]
cli = [
  "prompt_toolkit>=3.0",
  "jinja2>=3.0",
]

[project.scripts]
nexsec = "nexsec.main:app"
nexsec-agent = "nexsec.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nexsec"]

[tool.ruff]
line-length = 100
target-version = "py311"
