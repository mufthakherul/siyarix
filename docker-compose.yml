# =============================================================================
# Siyarix - Docker Compose
# =============================================================================
# Usage:
#   docker compose up -d siyarix          # Python base (default)
#   docker compose up -d siyarix-kali     # Kali base
#   docker compose --profile telemetry up # with OpenTelemetry
# =============================================================================

services:
  # ----  Main service (Python base)  ----------------------------------------
  siyarix:
    build:
      context: .
      target: python
      args:
        SIYARIX_VERSION: ${SIYARIX_VERSION:-3.0.0}
    image: siyarix:${SIYARIX_TAG:-latest}
    container_name: siyarix
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      - SIYARIX_LOG_LEVEL=${SIYARIX_LOG_LEVEL:-INFO}
      - SIYARIX_PERSONA=${SIYARIX_PERSONA:-bug_hunter}
      - SIYARIX_PROVIDER=${SIYARIX_PROVIDER:-noop}
      - SIYARIX_NO_TELEMETRY=${SIYARIX_NO_TELEMETRY:-1}
      - SIYARIX_HOME=/home/siyarix/.siyarix
      - REDIS_URL=${REDIS_URL:-}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    volumes:
      - siyarix_config:/home/siyarix/.siyarix
      - siyarix_output:/home/siyarix/output
      - ${SIYARIX_CUSTOM_DIR:-./custom}:/home/siyarix/custom:ro
    ports:
      - "${SIYARIX_API_PORT:-8000}:8000"
    networks:
      - siyarix_net
    healthcheck:
      test: ["CMD-SHELL", "siyarix --help > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ----  Kali variant (full pentest suite)  ---------------------------------
  siyarix-kali:
    build:
      context: .
      target: kali
      args:
        SIYARIX_VERSION: ${SIYARIX_VERSION:-3.0.0}
    image: siyarix:${SIYARIX_TAG_KALI:-kali}
    container_name: siyarix-kali
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      - SIYARIX_LOG_LEVEL=${SIYARIX_LOG_LEVEL:-INFO}
      - SIYARIX_PERSONA=${SIYARIX_PERSONA:-bug_hunter}
      - SIYARIX_PROVIDER=${SIYARIX_PROVIDER:-noop}
      - SIYARIX_NO_TELEMETRY=${SIYARIX_NO_TELEMETRY:-1}
      - SIYARIX_HOME=/home/siyarix/.siyarix
      - REDIS_URL=${REDIS_URL:-}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    volumes:
      - siyarix_kali_config:/home/siyarix/.siyarix
      - siyarix_output:/home/siyarix/output
      - ${SIYARIX_CUSTOM_DIR:-./custom}:/home/siyarix/custom:ro
    ports:
      - "${SIYARIX_KALI_API_PORT:-8001}:8000"
    networks:
      - siyarix_net
    healthcheck:
      test: ["CMD-SHELL", "siyarix --help > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    profiles:
      - kali
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # ----  Redis (optional, enables caching)  ---------------------------------
  redis:
    image: redis:7-alpine
    container_name: siyarix-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - siyarix_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M

  # ----  OpenTelemetry Collector (optional, telemetry profile)  -------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: siyarix-otel
    restart: unless-stopped
    environment:
      - TZ=UTC
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "${OTEL_PORT:-4318}:4318"
    networks:
      - siyarix_net
    profiles:
      - telemetry
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

networks:
  siyarix_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16

volumes:
  siyarix_config:
    name: siyarix_config
  siyarix_kali_config:
    name: siyarix_kali_config
  siyarix_output:
    name: siyarix_output
  redis_data:
    name: siyarix_redis_data
