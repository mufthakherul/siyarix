# SPDX-License-Identifier: AGPL-3.0-or-later
# Auto-label PRs based on changed file paths

core:
  - changed-files:
      - any-glob-to-match: 'src/siyarix/**/*.py'

providers:
  - changed-files:
      - any-glob-to-match: 'src/siyarix/providers/**/*.py'

chat:
  - changed-files:
      - any-glob-to-match: 'src/siyarix/chat/**/*.py'

cli:
  - changed-files:
      - any-glob-to-match: 'src/siyarix/cli/**/*.py'

reporting:
  - changed-files:
      - any-glob-to-match: 'src/siyarix/report/**/*.py'

api:
  - changed-files:
      - any-glob-to-match: 'src/siyarix/api/**/*.py'

testing:
  - changed-files:
      - any-glob-to-match: 'tests/**/*.py'

documentation:
  - changed-files:
      - any-glob-to-match: 'docs/**/*.md'

ci/cd:
  - changed-files:
      - any-glob-to-match: '.github/**/*.yml'

docker:
  - changed-files:
      - any-glob-to-match: 'Dockerfile'

installer:
  - changed-files:
      - any-glob-to-match: 'install.sh'
      - any-glob-to-match: 'install.ps1'

dependencies:
  - changed-files:
      - any-glob-to-match: 'pyproject.toml'
