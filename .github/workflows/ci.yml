name: CI

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install ruff black pytest pytest-cov mypy coverage

      - name: Run Ruff linter
        run: ruff check src tests --output-format=github

      - name: Run Black formatter check
        run: black --check .

      - name: Run MyPy type checker
        run: mypy src --ignore-missing-imports --no-error-summary

      - name: Check for required files
        run: |
          echo "Checking for required files..."
          ls -la pyproject.toml setup.py setup.cfg 2>/dev/null || true

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest, macos-latest]
        exclude:
          - python-version: "3.13"
            os: windows-latest
          - python-version: "3.13"
            os: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pytest pytest-asyncio pytest-cov pytest-timeout

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-branch \
            -v \
            --tb=short \
            -m "not integration"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}-${{ matrix.os }}
          path: |
            .pytest_cache/
            test-results/
          retention-days: 7

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run integration tests
        run: pytest -v -m integration --timeout=300

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Run Bandit security scan
        run: |
          pip install bandit bandit-formatter
          bandit -r src/ -f json -o bandit-report.json || true
          bandit -r src/ --config .bandit

      - name: Run Safety vulnerability scan
        run: |
          pip install safety
          safety check --json > safety-report.json || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  compatibility:
    name: Compatibility Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Check package metadata
        run: |
          pip install check-wheel-contents twine
          python -m build --sdist
          twine check dist/*

      - name: Verify entry points
        run: |
          python -c "from nexsec import main; print('CLI OK')"
          python -c "import nexsec; print('Package OK')"

  lint-all-files:
    name: Full Lint Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install all linters
        run: |
          pip install ruff black pylint flake8 mypy isort

      - name: Run comprehensive lint
        run: |
          echo "=== Ruff ===" && ruff check src tests . --output-format=concise || true
          echo "=== Black ===" && black --check src tests . || true
          echo "=== Pylint ===" && pylint src --output-format=parseable || true
          echo "=== Flake8 ===" && flake8 src tests --count || true
          echo "=== MyPy ===" && mypy src --ignore-missing-imports || true
          echo "=== isort ===" && isort --check-only src tests || true

  # Notify on failure
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [quality-checks, test, security-audit, compatibility]
    if: failure() && github.event_name == 'push'
    steps:
      - name: Send failure notification
        if: env.DISCORD_WEBHOOK_URL != ''
        run: |
          echo "::warning::Add DISCORD_WEBHOOK_URL secret to enable notifications"