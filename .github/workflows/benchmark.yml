name: Performance Benchmark

on:
  pull_request:
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install with benchmark deps
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system pytest-benchmark

      - name: Run Benchmarks
        continue-on-error: true
        run: pytest tests/ --benchmark-only -v --benchmark-json benchmark.json || true

      - name: Compare with main
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            try {
              const data = JSON.parse(fs.readFileSync('benchmark.json', 'utf8'));
              let comment = '**Performance Benchmark Results**\n\n| Test | Mean (s) | Std Dev |\n|------|----------|--------|\n';
              for (const b of data.benchmarks || []) {
                comment += `| ${b.name} | ${b.stats.mean.toFixed(4)} | ${b.stats.stddev.toFixed(4)} |\n`;
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: comment
              });
            } catch (e) {
              console.log('Could not generate benchmark report:', e.message);
            }
