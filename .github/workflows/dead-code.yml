name: Dead Code Detection

on:
  pull_request:
  workflow_dispatch:

jobs:
  vulture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Vulture
        run: uv pip install --system vulture

      - name: Find Dead Code
        continue-on-error: true
        run: vulture src/ .vulture_whitelist.py --min-confidence 100 || true
