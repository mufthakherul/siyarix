name: Coverage

on:
  push:
    branches: [main, develop]
    paths:
      - '**.py'
      - 'tests/**'
      - 'pyproject.toml'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    name: Coverage Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system pytest pytest-asyncio pytest-cov coverage lxml click openai respx

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-branch \
            --cov-fail-under=40 \
            -v \
            --junitxml=pytest.xml \
            -m "not integration"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 30

  pr-comment:
    name: Comment Coverage on PR
    runs-on: ubuntu-latest
    needs: coverage
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Download 3.12 coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report-3.12

      - name: Generate and post coverage comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const xml = fs.readFileSync('coverage.xml', 'utf8');
              const lineMatch = xml.match(/line-rate="([0-9.]+)"/);
              const branchMatch = xml.match(/branch-rate="([0-9.]+)"/);
              const lineRate = lineMatch ? (parseFloat(lineMatch[1]) * 100).toFixed(1) : 'N/A';
              const branchRate = branchMatch ? (parseFloat(branchMatch[1]) * 100).toFixed(1) : 'N/A';
              const icon = parseFloat(lineRate) >= 80 ? ':green_circle:' : parseFloat(lineRate) >= 50 ? ':yellow_circle:' : ':red_circle:';

              const body = `## Coverage Report

              | Metric | Coverage |
              |--------|----------|
              | Line Coverage | ${lineRate}% |
              | Branch Coverage | ${branchRate}% |

              ${icon} **${parseFloat(lineRate) >= 50 ? 'Passing' : 'Below threshold'}** (50% minimum)

              *Reported for Python 3.12*`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body
              });
            } catch (e) {
              console.log('Could not generate coverage comment:', e.message);
            }

  codecov-upload:
    name: Upload to Codecov
    runs-on: ubuntu-latest
    needs: coverage
    if: always()
    steps:
      - name: Download 3.12 coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report-3.12

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: siyarix
          fail_ci_if_error: false
          verbose: true

  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: coverage
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Python Version | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 3.11 | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3.12 | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3.13 | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Coverage threshold: 50% line rate (enforced via --cov-fail-under)*" >> $GITHUB_STEP_SUMMARY
