[project]
name = "phalanx"
version = "0.1.3-beta"
description = "Phalanx — AI-native cybersecurity operations platform with autonomous execution, multi-agent framework, and intelligent workflow orchestration"
description-content-type = "text/markdown"
readme = "README.md"
authors = [ { name = "MD MUFTHAKHERUL ISLAM MIRAZ", email = "130831166+mufthakherul@users.noreply.github.com" } ]
requires-python = ">=3.11"
urls = { "Homepage" = "https://github.com/mufthakherul/phalanx", "Repository" = "https://github.com/mufthakherul/phalanx.git" }
license = { text = "MIT" }
keywords = ["cybersecurity", "agent", "nmap", "scanner", "autonomous", "integrated", "security"]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Topic :: Security",
  "Typing :: Typed",
]
dependencies = [
  "typer>=0.12",
  "rich>=13",

  "httpx>=0.27",
  "pydantic>=2.5",
  "aiofiles>=23.0",
  "keyring>=25.0",
  "cryptography>=42.0",
  "defusedxml>=0.7",
  "tenacity>=8.2.0",
  "psutil>=5.9.0",
  "google-generativeai>=0.8.0",
]

[project.optional-dependencies]
autonomous = [
  "openai>=2.31.0",
]
siem = [
  "httpx>=0.27",
]
fast = [
  "maturin>=1.7",
]
all = [
  "openai>=2.31.0",
  "pyyaml>=6.0",
  "maturin>=1.7",
]
cli = [
  "prompt_toolkit>=3.0",
  "jinja2>=3.0",
]

[project.scripts]
phalanx = "phalanx.main:app"
phalanx-agent = "phalanx.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/phalanx"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
check_untyped_defs = true
disallow_untyped_defs = false
ignore_missing_imports = true
warn_unused_ignores = true
strict_optional = true


[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
