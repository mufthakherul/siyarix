name: Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  issues:
    types: [opened, edited, labeled]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-prs:
    name: Label PRs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Label PR based on files changed
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

      - name: Label PR based on branch name
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;

            // Label based on branch patterns
            const labels = [];

            if (branch.startsWith('feature/') || branch.startsWith('feat/')) {
              labels.push('enhancement');
            } else if (branch.startsWith('fix/') || branch.startsWith('bugfix/')) {
              labels.push('bug');
            } else if (branch.startsWith('docs/')) {
              labels.push('documentation');
            } else if (branch.startsWith('refactor/')) {
              labels.push('refactoring');
            } else if (branch.startsWith('test/')) {
              labels.push('testing');
            } else if (branch.startsWith('ci/') || branch.startsWith('workflow/')) {
              labels.push('ci/cd');
            }

            // Add size labels
            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const changes = additions + deletions;

            if (changes < 100) {
              labels.push('size: small');
            } else if (changes < 500) {
              labels.push('size: medium');
            } else {
              labels.push('size: large');
            }

            // Apply labels
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: labels
              });
            }

      - name: Add review required labels
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const changedFiles = pr.changed_files || 0;
            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;

            // Add complexity labels
            if (changedFiles > 20 || additions + deletions > 1000) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['complex']
              });
            }

      - name: Auto-add needs-review label
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const hasReviewers = pr.requested_reviewers && pr.requested_reviewers.length > 0;

            if (!hasReviewers) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['needs-review']
              });
            }

  label-issues:
    name: Label Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    steps:
      - name: Label issue based on title/body
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();

            const labels = [];

            // Bug detection
            if (title.includes('bug') || title.includes('error') || title.includes('crash') || title.includes('fail')) {
              labels.push('bug');
            }

            // Feature request
            if (title.includes('feature') || title.includes('add') || title.includes('implement') || title.includes('support')) {
              labels.push('enhancement');
            }

            // Documentation
            if (title.includes('doc') || title.includes('readme') || title.includes('docs')) {
              labels.push('documentation');
            }

            // Question
            if (title.includes('how') || title.includes('?') || body.includes('help') || body.includes('question')) {
              labels.push('question');
            }

            // Security
            if (title.includes('security') || title.includes('vulnerability') || body.includes('cve')) {
              labels.push('security');
            }

            // Apply labels if any found
            if (labels.length > 0) {
              // Check if labels already exist
              const existingLabels = issue.labels.map(l => l.name);
              const newLabels = labels.filter(l => !existingLabels.includes(l));

              if (newLabels.length > 0) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: newLabels
                });
              }
            }

  triage-new:
    name: Triage New Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    steps:
      - name: Welcome message
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Add triage label
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issue.number,
              labels: ['triage']
            });

            // Check for first-time contributors
            const { data: events } = await github.rest.issues.listEvents({
              owner,
              repo,
              issue_number: issue.number,
              per_page: 50
            });

            const isFirstContribution = !events.some(e => e.event === 'issues' || e.event === 'pull_request');

            if (isFirstContribution) {
              // Add first-timer label
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: ['first-timer']
              });

              // Add welcome comment
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Welcome to ${repo}! 🎉

Thank you for opening a new issue. To help us address this efficiently, please provide:

1. **Clear description** - What are you trying to achieve?
2. **Steps to reproduce** - How can we replicate this?
3. **Expected vs actual behavior** - What should happen instead?
4. **Environment details** - OS, Python version, etc.

We appreciate your contribution!`
              });
            }