name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  validate-tag:
    name: Validate Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        run: |
          git log --pretty=format:"- %s (%h)" ${{ github.event.inputs.version }}..HEAD --since="" > CHANGELOG_NEW.md 2>/dev/null || echo "Changes in this release" > CHANGELOG_NEW.md
          cat CHANGELOG_NEW.md >> $GITHUB_OUTPUT

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine check-wheel-contents

      - name: Build source distribution
        run: python -m build --sdist

      - name: Build wheel distribution
        run: python -m build --wheel

      - name: Check wheel contents
        run: check-wheel-contents dist/

      - name: Verify package metadata
        run: |
          twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 5

  test-package:
    name: Test Package
    runs-on: ubuntu-latest
    needs: [validate-tag, build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download distribution
        uses: actions/download-artifact@v4.1.3
        with:
          name: dist
          path: dist/

      - name: Install package
        run: |
          pip install dist/*.whl
          pip install dist/*.tar.gz

      - name: Verify installation
        run: |
          phalanx --version || true
          python -c "import phalanx; print('Package imported successfully')"

      - name: Run basic tests
        run: |
          pytest tests/ -v -x --timeout=60 -m "not integration" || true

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [validate-tag, build, test-package]
    environment:
      name: pypi
      url: https://pypi.org/project/phalanx/
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - name: Download distribution
        uses: actions/download-artifact@v4.1.3
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip_existing: true

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [validate-tag, build, test-package]
    if: github.event.inputs.publish_test == 'true' || false
    environment:
      name: testpypi
      url: https://test.pypi.org/project/phalanx/
    permissions:
      id-token: write
    steps:
      - name: Download distribution
        uses: actions/download-artifact@v4.1.3
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          skip_existing: true

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-tag, build, test-package, publish-pypi]
    permissions:
      contents: write
    steps:
      - name: Download distribution
        uses: actions/download-artifact@v4.1.3
        with:
          name: dist
          path: dist/

      - name: Generate release notes
        id: release-notes
        run: |
          # Extract PR numbers and contributors
          echo "## What's Changed" > release_notes.md
          git log --pretty=format:"- %s (%an)" ${{ needs.validate-tag.outputs.version }}^..HEAD >> release_notes.md || true
          cat release_notes.md >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-tag.outputs.version }}
          name: Release v${{ needs.validate-tag.outputs.version }}
          body: ${{ needs.validate-tag.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(needs.validate-tag.outputs.version, 'alpha') || contains(needs.validate-tag.outputs.version, 'beta') || contains(needs.validate-tag.outputs.version, 'rc') }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew
    runs-on: ubuntu-latest
    needs: [validate-tag, publish-pypi]
    if: contains(github.ref, 'refs/tags/v')
    steps:
      - name: Notify Homebrew
        run: |
          # Homebrew auto-updates via form, but we can ping maintainers
          echo "Homebrew package will be auto-updated"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [validate-tag, publish-pypi, create-github-release]
    if: always()
    steps:
      - name: Create summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.validate-tag.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Package | ${{ needs.test-package.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Publish PyPI | ${{ needs.publish-pypi.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ${{ needs.create-github-release.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Discord notification
        if: env.DISCORD_WEBHOOK_URL != ''
        run: |
          echo "Add Discord webhook for release notifications"
