name: Maintenance

on:
  schedule:
    - cron: '0 6 * * 1'
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      task:
        description: Maintenance task to run
        required: true
        type: choice
        options:
          - all
          - update-deps
          - cleanup
          - audit

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  weekly-update:
    name: Weekly Dependency Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Check outdated
        run: |
          pip install -e .
          echo "## Outdated Dependencies" >> $GITHUB_STEP_SUMMARY
          pip list --outdated --format=columns >> $GITHUB_STEP_SUMMARY || echo "None"

  monthly-audit:
    name: Monthly Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && contains(github.event.schedule, '0 0 1 * *')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run full test suite
        run: |
          pip install -e .[dev]
          pytest -v --tb=short -x || true

  cleanup:
    name: Repository Cleanup
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.task == 'all' || github.event.inputs.task == 'cleanup')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Delete old artifacts
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { data: artifacts } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - 30);
            for (const a of artifacts.artifacts) {
              if (new Date(a.created_at) < cutoff) {
                await github.rest.actions.deleteArtifact({ owner: context.repo.owner, repo: context.repo.repo, artifact_id: a.id });
                console.log(`Deleted artifact: ${a.name}`);
              }
            }

  audit:
    name: Full Repository Audit
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.task == 'all' || github.event.inputs.task == 'audit')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Generate audit report
        run: |
          echo "# Repository Audit Report" > audit.md
          echo "Date: $(date)" >> audit.md
          echo "" >> audit.md
          echo "## Branches" >> audit.md
          git branch -a | wc -l | xargs echo "- Total:" >> audit.md
          echo "" >> audit.md
          echo "## Commits" >> audit.md
          git rev-list --count HEAD | xargs echo "- Total:" >> audit.md
          echo "" >> audit.md
          echo "## Contributors" >> audit.md
          git shortlog -sn | head -10 >> audit.md
          echo "" >> audit.md
          echo "## Files" >> audit.md
          find . -type f -name "*.py" | wc -l | xargs echo "- Python files:" >> audit.md
          echo "" >> audit.md
          cat audit.md

      - name: Upload audit report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: audit-report
          path: audit.md
