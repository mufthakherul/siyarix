name: CI

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_MIN: "3.11"
  PYTHON_STABLE: "3.12"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ env.PYTHON_STABLE }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_STABLE }}

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system ruff mypy

      - name: Determine changed Python files
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            BASE="HEAD~1"
            HEAD="HEAD"
          else
            BASE="$(git rev-list --max-parents=0 HEAD)"
            HEAD="HEAD"
          fi
          CHANGED=$(git diff --name-only --diff-filter=ACMRT "$BASE" "$HEAD" | grep -E '\.py$' | tr '\n' ' ' || true)
          echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "head=${HEAD}" >> "$GITHUB_OUTPUT"
          echo "Files to check: ${CHANGED:-none}"

      - name: Ruff lint
        if: steps.changes.outputs.changed != ''
        run: ruff check ${{ steps.changes.outputs.changed }} --output-format=github

      - name: Ruff format
        if: steps.changes.outputs.changed != ''
        run: ruff format --check --diff ${{ steps.changes.outputs.changed }}

      - name: MyPy
        if: steps.changes.outputs.changed != ''
        run: mypy --ignore-missing-imports --no-error-summary --no-warn-unused-ignores --follow-imports=silent ${{ steps.changes.outputs.changed }}

      - name: Pre-commit hooks
        env:
          BASE_REF: ${{ steps.changes.outputs.base }}
          HEAD_REF: ${{ steps.changes.outputs.head }}
        run: |
          pipx run pre-commit run --from-ref "$BASE_REF" --to-ref "$HEAD_REF" || true

  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system pytest pytest-asyncio pytest-cov pytest-timeout pytest-xdist click openai respx

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-branch \
            -n auto \
            -v \
            --tb=short \
            -m "not integration"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}-${{ matrix.os }}
          path: coverage.xml
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          env_vars: OS,PYTHON
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false


  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'safe-integration'))
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ env.PYTHON_STABLE }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_STABLE }}

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system pytest pytest-timeout

      - name: Run integration tests
        continue-on-error: true
        run: |
          pytest -v -m integration --timeout=300 -x || code=$?
          if [ "${code:-0}" -eq 5 ]; then
            echo "No integration tests collected; treating as success."
            exit 0
          fi
          exit "${code:-0}"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ env.PYTHON_STABLE }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_STABLE }}

      - name: Install dependencies
        run: uv pip install --system -e .

      - name: Bandit
        run: |
          uv pip install --system bandit
          bandit -r src/ -f sarif -o bandit-report.sarif -ll || true

      - name: pip-audit
        run: |
          uv pip install --system pip-audit
          pip-audit --format json --output pip-audit.json || true
          python -c "
          import json
          with open('pip-audit.json') as f:
              data = json.load(f)
          vulns = []
          for dep in data:
              vulns.extend(dep.get('vulns', []))
          critical_high = [v for v in vulns if v.get('severity') in ('high', 'critical')]
          if critical_high:
              print(f'::error::{len(critical_high)} high/critical vulnerabilities found')
              for v in critical_high:
                  print(f'  - {v.get(\"id\", \"?\")}: {v.get(\"description\", \"\")[:200]}')
              import sys; sys.exit(2)
          print(f'{len(vulns)} total vulnerabilities (none critical/high)')
          "

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-reports
          path: |
            bandit-report.sarif
            pip-audit.json

  compatibility:
    name: Package Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ env.PYTHON_STABLE }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_STABLE }}

      - name: Install build tools
        run: |
          uv pip install --system build twine check-wheel-contents

      - name: Build sdist & wheel
        run: python -m build

      - name: Check wheel
        run: check-wheel-contents dist/

      - name: Twine check
        run: twine check dist/*

      - name: Verify entry points
        run: |
          uv pip install --system dist/*.whl
          python -c "from siyarix import main; print('CLI entry point OK')"
          python -c "import siyarix; print('Package import OK:', siyarix.__version__)"

  full-lint:
    name: Full Repository Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ env.PYTHON_STABLE }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_STABLE }}

      - name: Install linters
        run: |
          uv pip install --system ruff mypy -e ".[dev]"

      - name: Full lint scan
        continue-on-error: true
        run: |
          echo "::group::Ruff Lint"
          ruff check src tests --output-format=github
          echo "::endgroup::"

          echo "::group::Ruff Format"
          ruff format --check src tests
          echo "::endgroup::"

          echo "::group::MyPy"
          mypy src tests || true
          echo "::endgroup::"

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, test, security-audit, compatibility]
    if: failure() && github.event_name == 'push'
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure'
            });
            if (existing.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `CI Failure on ${context.ref.replace('refs/heads/', '')}`,
                body: `CI pipeline failed on branch \`${context.ref.replace('refs/heads/', '')}\`.

                Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
                Commit: ${context.sha}

                Please investigate and resolve the issues.`,
                labels: ['ci-failure', 'bug']
              });
            }
