name: Build Packages

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'packages/**'
      - 'install.sh'
      - 'install.ps1'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'packages/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  build-python:
    name: Python Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine check-wheel-contents
      - run: python -m build
      - run: twine check dist/*
      - run: check-wheel-contents dist/

  build-npm:
    name: NPM Package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node --check bin/siyarix.js
      - run: node --check bin/siyarix-install.js
      - run: node --check lib/installer.js
      - run: npm pack --dry-run

  build-deb:
    name: DEB Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq dpkg-dev fakeroot
      - run: bash packages/deb/build-deb.sh "0.1.3"

  build-installers:
    name: Cross-Platform Installers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck install.sh
        run: |
          if command -v shellcheck &>/dev/null; then
            shellcheck -S error -e SC1091 install.sh
          else
            echo "shellcheck not available, skipping"
          fi
      - name: Validate install.ps1
        run: |
          if command -v pwsh &>/dev/null; then
            pwsh -NoProfile -Command "Get-Content install.ps1 | Invoke-Expression 2>&1" || true
          else
            echo "PowerShell not available, skipping"
          fi
      - name: Verify harmonyos installer
        run: bash -n packages/harmonyos/install-harmonyos.sh

  check-matrix:
    name: Package Build Matrix
    runs-on: ubuntu-latest
    needs: [build-python, build-npm, build-deb, build-installers]
    if: always()
    steps:
      - run: |
          echo "## Package Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python (sdist/wheel) | ${{ needs.build-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| NPM | ${{ needs.build-npm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DEB | ${{ needs.build-deb.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Installers | ${{ needs.build-installers.result }} |" >> $GITHUB_STEP_SUMMARY
