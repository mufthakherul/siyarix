name: Build Packages

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'packages/**'
      - 'install.sh'
      - 'install.ps1'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'packages/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  resolve-version:
    name: Resolve Package Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Extract version from pyproject.toml
        id: version
        run: |
          VER=$(python -c "import re; print(re.search(r'^version = \"([^\"]+)\"', open('pyproject.toml').read(), re.M).group(1))")
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VER}"

  build-python:
    name: Python Package
    runs-on: ubuntu-latest
    needs: resolve-version
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Build & check
        run: |
          uv pip install --system build twine check-wheel-contents
          python -m build
          twine check dist/*
          check-wheel-contents --ignore W002 dist/ || true

      - name: Upload wheel
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-package
          path: dist/
          retention-days: 14


  build-deb:
    name: DEB Package
    runs-on: ubuntu-latest
    needs: resolve-version
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install deb build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev fakeroot

      - name: Build .deb
        run: bash packages/deb/build-deb.sh "${{ needs.resolve-version.outputs.version }}"

      - name: Upload .deb
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deb-package
          path: "*.deb"
          retention-days: 14

  build-installers:
    name: Cross-Platform Installers
    runs-on: ubuntu-latest
    needs: resolve-version
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Shellcheck install.sh
        run: |
          sudo apt-get install -y -qq shellcheck
          find . -maxdepth 1 -name '*.sh' -not -path './.venv/*' -exec shellcheck --severity=error {} + || true
      - name: Validate install.ps1
        run: |
          if command -v pwsh &>/dev/null; then
            pwsh -NoProfile -Command "Get-Content install.ps1 | Invoke-Expression 2>&1" || true
          else
            echo "PowerShell not available, skipping"
          fi

  check-matrix:
    name: Package Build Matrix
    runs-on: ubuntu-latest
    needs: [build-python, build-deb, build-installers]
    if: always()
    steps:
      - run: |
          echo "## Package Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python (sdist/wheel) | ${{ needs.build-python.result }} |" >> $GITHUB_STEP_SUMMARY

          echo "| DEB | ${{ needs.build-deb.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Installers | ${{ needs.build-installers.result }} |" >> $GITHUB_STEP_SUMMARY
