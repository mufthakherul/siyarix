name: Release Readiness

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/release.yml'
      - 'pyproject.toml'
      - 'src/siyarix/__init__.py'
      - 'install.ps1'
      - 'packages/deb/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version-sync:
    name: Version Synchronization
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Validate version consistency
        run: |
          uv pip install --system tomli tomli-w 2>/dev/null || true
          python - <<'PY'
          import json
          import re
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          pyproject_version = pyproject["project"]["version"]

          init_text = Path("src/siyarix/__init__.py").read_text(encoding="utf-8")
          init_match = re.search(r'__version__\s*=\s*"([^"]+)"', init_text)
          if not init_match:
            raise SystemExit("Unable to find __version__ in src/siyarix/__init__.py")
          init_version = init_match.group(1)

          install_ps1 = Path("install.ps1").read_text(encoding="utf-8")
          ps1_match = re.search(r'\$__script_version\s*=\s*"([^"]+)"', install_ps1)
          if not ps1_match:
            raise SystemExit("Unable to find $__script_version in install.ps1")
          ps1_version = ps1_match.group(1)

          versions = {
              "pyproject.toml": pyproject_version,
              "src/siyarix/__init__.py": init_version,
              "install.ps1": ps1_version,
          }
          unique_versions = set(versions.values())
          if len(unique_versions) != 1:
              raise SystemExit(f"Version mismatch detected: {versions}")
          print(f"Version synchronized: {pyproject_version}")
          PY

  build-python-release-assets:
    name: Python Release Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: uv pip install --system build twine check-wheel-contents
      - run: python -m build
      - run: twine check dist/*
      - run: check-wheel-contents dist/
